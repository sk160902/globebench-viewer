<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GlobeBench Combined — Human Validation</title>
<style>
  :root { --bg:#0f1419; --card:#1a212b; --line:#2b3440; --fg:#e6edf3; --mut:#8b98a8;
          --route:#4f9cf9; --knowledge:#f0a35e; --image:#7ee0a1; --good:#2ea043; --bad:#d4534a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; z-index:5; background:#0f1419ee; backdrop-filter:blur(6px);
           border-bottom:1px solid var(--line); padding:12px 18px; }
  h1 { font-size:16px; margin:0 0 8px; }
  .bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  select, input[type=text], button { background:var(--card); color:var(--fg); border:1px solid var(--line);
           border-radius:7px; padding:6px 10px; font-size:13px; }
  button { cursor:pointer; }
  button:hover { border-color:#4a5568; }
  .stat { color:var(--mut); font-size:13px; margin-left:4px; }
  .stat b { color:var(--fg); }
  main { padding:16px; max-width:920px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:14px 16px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; align-items:center; }
  .chip { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--line); color:var(--mut); }
  .chip.route { color:var(--route); border-color:var(--route); }
  .chip.knowledge { color:var(--knowledge); border-color:var(--knowledge); }
  .chip.image { color:var(--image); border-color:var(--image); }
  .q { font-size:15px; margin:6px 0 10px; }
  .imgwrap { margin:8px 0 12px; }
  .imgwrap img { max-width:100%; border-radius:8px; border:1px solid var(--line); display:block; }
  .opts { list-style:none; padding:0; margin:0 0 6px; }
  .opt { padding:5px 10px; border:1px solid var(--line); border-radius:7px; margin-bottom:5px; display:flex; gap:8px; }
  .opt.correct { border-color:var(--good); background:#13351f; }
  .opt .id { color:var(--mut); width:18px; }
  .gold { color:var(--good); font-size:12.5px; margin:4px 0 10px; }
  .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:10px; }
  .vbtn { padding:6px 14px; }
  .vbtn.on-good { background:var(--good); border-color:var(--good); color:#fff; }
  .vbtn.on-bad { background:var(--bad); border-color:var(--bad); color:#fff; }
  .notes { flex:1; min-width:180px; }
  .muted { color:var(--mut); }
  .verdict-tag { font-size:12px; }
  /* per-item performance + open answers */
  details.block { margin-top:10px; border-top:1px solid var(--line); padding-top:8px; }
  details.block > summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--fg); user-select:none; }
  details.block[open] > summary { margin-bottom:8px; }
  table.perf { border-collapse:collapse; font-size:12.5px; margin-top:6px; width:100%; max-width:460px; }
  table.perf th, table.perf td { border:1px solid var(--line); padding:4px 8px; text-align:center; }
  table.perf th { color:var(--mut); font-weight:600; }
  table.perf td.model { text-align:left; }
  td.all  { background:#15351f; color:#bff0cc; }
  td.mix  { background:#3a3413; color:#f0e3a0; }
  td.none { background:#3a1815; color:#f0b3ad; }
  td.na   { color:var(--mut); }
  .legend { font-size:11px; color:var(--mut); margin-top:4px; }
  .oa { margin:6px 0; font-size:12.5px; }
  .oa .m { color:var(--mut); }
  .oa .txt { white-space:pre-wrap; }
  .oa .mode { font-size:11px; color:var(--mut); margin-left:4px; }
  /* global leaderboard */
  .lbwrap { max-width:920px; margin:0 auto 14px; }
  table.lb { border-collapse:collapse; font-size:13px; width:100%; }
  table.lb th, table.lb td { border:1px solid var(--line); padding:6px 10px; text-align:center; }
  table.lb th { color:var(--mut); }
  table.lb td.model { text-align:left; }
  table.lb td.bar { padding:0; }
  .barfill { height:18px; background:var(--route); border-radius:3px; }
</style>
</head>
<body>
<header>
  <h1>GlobeBench Combined — Human Validation</h1>
  <div class="bar">
    <select id="axis"><option value="">All axes</option></select>
    <select id="family"><option value="">All families</option></select>
    <select id="status">
      <option value="">All</option><option value="unreviewed">Unreviewed</option>
      <option value="valid">Valid</option><option value="invalid">Invalid</option>
    </select>
    <input type="text" id="search" placeholder="search question / place…" style="min-width:200px" />
    <span class="stat" id="counts"></span>
    <button id="exportJson">Export JSON</button>
    <button id="exportCsv">Export CSV</button>
    <button id="reset">Reset verdicts</button>
  </div>
</header>
<div class="lbwrap">
  <details class="block" id="lbBox">
    <summary>Overall model leaderboard (8 models, 3 seeds)</summary>
    <div id="lbTable"></div>
  </details>
</div>
<main id="list"></main>
<script src="combined_data.js"></script>
<script>
const PAYLOAD = window.GLOBEBENCH_COMBINED || {scenarios:[], leaderboard:[]};
const DATA = PAYLOAD.scenarios;
const LEADERBOARD = PAYLOAD.leaderboard || [];
const KEY = "globebench_combined_verdicts_v1";
const verdicts = JSON.parse(localStorage.getItem(KEY) || "{}");
const save = () => localStorage.setItem(KEY, JSON.stringify(verdicts));
const el = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c; if(h!==undefined)e.innerHTML=h; return e; };

// populate filters
const axisSel=document.getElementById('axis'), famSel=document.getElementById('family');
[...new Set(DATA.map(s=>s.axis))].sort().forEach(a=>axisSel.add(new Option(a,a)));
[...new Set(DATA.map(s=>s.task_family))].sort().forEach(f=>famSel.add(new Option(f,f)));

function passes(s){
  const ax=axisSel.value, fam=famSel.value, st=document.getElementById('status').value;
  const q=document.getElementById('search').value.toLowerCase();
  if(ax && s.axis!==ax) return false;
  if(fam && s.task_family!==fam) return false;
  const v=verdicts[s.scenario_id];
  if(st==='unreviewed' && v && v.verdict) return false;
  if(st==='valid' && !(v && v.verdict==='valid')) return false;
  if(st==='invalid' && !(v && v.verdict==='invalid')) return false;
  if(q && !(s.open_prompt.toLowerCase().includes(q) || (s.place||'').toLowerCase().includes(q))) return false;
  return true;
}

function counts(){
  const total=DATA.length;
  const v=Object.values(verdicts);
  const good=v.filter(x=>x.verdict==='valid').length, bad=v.filter(x=>x.verdict==='invalid').length;
  document.getElementById('counts').innerHTML =
    `<b>${good+bad}</b>/${total} reviewed · <span style="color:var(--good)">${good} valid</span> · <span style="color:var(--bad)">${bad} invalid</span>`;
}

function render(){
  const root=document.getElementById('list'); root.innerHTML='';
  DATA.filter(passes).forEach(s=>{
    const c=el('div','card');
    const chips=el('div','chips');
    chips.appendChild(el('span','chip '+s.axis, s.axis));
    chips.appendChild(el('span','chip', s.task_family));
    if(s.place) chips.appendChild(el('span','chip', s.place));
    chips.appendChild(el('span','chip', s.scenario_id));
    c.appendChild(chips);
    if(s.image_path){ const w=el('div','imgwrap'); const im=el('img'); im.src=s.image_path; im.loading='lazy';
      im.onerror=()=>{im.replaceWith(el('div','muted','[image not found: '+s.image_path+']'));}; w.appendChild(im); c.appendChild(w); }
    c.appendChild(el('div','q', s.open_prompt));
    if(s.options && s.options.length){
      const ul=el('ul','opts');
      s.options.forEach(o=>{ const li=el('li','opt'+(o.correct?' correct':''));
        li.appendChild(el('span','id', o.id+'.')); li.appendChild(el('span','', o.text + (o.correct?'  ✓':''))); ul.appendChild(li); });
      c.appendChild(ul);
    }
    c.appendChild(el('div','gold','Gold answer: '+(s.gold.answer || s.gold.choice_id || '?')));

    // --- per-item model performance (seeds correct / total, closed-book vs web-search) ---
    if(s.perf && s.perf.length){
      const d=el('details','block'); d.appendChild(el('summary',null,'Model performance on this item'));
      const cls=(cell)=>{ if(!cell || !cell.t) return 'na'; if(cell.c===cell.t) return 'all'; if(cell.c===0) return 'none'; return 'mix'; };
      const txt=(cell)=> (cell && cell.t) ? (cell.c+'/'+cell.t) : '–';
      let h='<table class="perf"><tr><th>Model</th><th>Closed-book</th><th>Tool use</th></tr>';
      s.perf.forEach(p=>{
        h+='<tr><td class="model">'+p.model+'</td>'
          +'<td class="'+cls(p.none)+'">'+txt(p.none)+'</td>'
          +'<td class="'+(p.open_model?'na':cls(p.tools))+'">'+(p.open_model?'n/a':txt(p.tools))+'</td></tr>';
      });
      h+='</table><div class="legend">Seeds correct / total. Green = all, yellow = mixed, red = none. Open-weight models have no native tools (n/a).</div>';
      const box=el('div'); box.innerHTML=h; d.appendChild(box); c.appendChild(d);
    }

    // --- open-ended answers per model ---
    if(s.open_answers && s.open_answers.length){
      const d=el('details','block'); d.appendChild(el('summary',null,'Open-ended answers'));
      s.open_answers.forEach(o=>{
        const wrap=el('div','oa');
        wrap.appendChild(el('span','m', o.model+': '));
        if(o.none){ const t=el('span','txt', o.none); wrap.appendChild(t); }
        else wrap.appendChild(el('span','muted','(no response)'));
        if(o.tools){ wrap.appendChild(el('span','mode','[tool use: ')); wrap.appendChild(el('span','txt', o.tools)); wrap.appendChild(el('span','mode',']')); }
        d.appendChild(wrap);
      });
      c.appendChild(d);
    }

    // actions
    const a=el('div','actions');
    const v=verdicts[s.scenario_id]||{};
    const gb=el('button','vbtn'+(v.verdict==='valid'?' on-good':''),'✓ Valid');
    const bb=el('button','vbtn'+(v.verdict==='invalid'?' on-bad':''),'✗ Invalid');
    const notes=el('input','notes'); notes.type='text'; notes.placeholder='notes (optional)'; notes.value=v.notes||'';
    gb.onclick=()=>{ verdicts[s.scenario_id]={verdict:'valid',notes:notes.value}; save(); render(); counts(); };
    bb.onclick=()=>{ verdicts[s.scenario_id]={verdict:'invalid',notes:notes.value}; save(); render(); counts(); };
    notes.onchange=()=>{ verdicts[s.scenario_id]={verdict:(verdicts[s.scenario_id]||{}).verdict||'', notes:notes.value}; save(); };
    a.append(gb,bb,notes);
    c.appendChild(a);
    root.appendChild(c);
  });
  if(!root.children.length) root.appendChild(el('div','muted','No scenarios match the filters.'));
}

function exportRows(){
  return DATA.map(s=>{ const v=verdicts[s.scenario_id]||{}; return {
    scenario_id:s.scenario_id, axis:s.axis, task_family:s.task_family, place:s.place,
    verdict:v.verdict||'', notes:(v.notes||'').replace(/\n/g,' '), gold:s.gold.answer||s.gold.choice_id||'' }; });
}
document.getElementById('exportJson').onclick=()=>{
  const blob=new Blob([JSON.stringify(exportRows(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='globebench_human_verdicts.json'; a.click();
};
document.getElementById('exportCsv').onclick=()=>{
  const rows=exportRows(); const cols=Object.keys(rows[0]);
  const csv=[cols.join(',')].concat(rows.map(r=>cols.map(c=>'"'+String(r[c]).replace(/"/g,'""')+'"').join(','))).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='globebench_human_verdicts.csv'; a.click();
};
document.getElementById('reset').onclick=()=>{ if(confirm('Clear all verdicts?')){ for(const k in verdicts) delete verdicts[k]; save(); render(); counts(); } };
function renderLeaderboard(){
  if(!LEADERBOARD.length) return;
  let h='<table class="lb"><tr><th>Model</th><th>MCQ closed-book %</th><th>MCQ tool use %</th><th>Open-answer %</th></tr>';
  LEADERBOARD.forEach(r=>{
    const tools = r.open_model ? '<span class="muted">n/a</span>' : (r.mcq_tools==null?'–':r.mcq_tools);
    h+='<tr><td class="model">'+r.model+'</td>'
      +'<td>'+(r.mcq_none==null?'–':r.mcq_none)+'</td>'
      +'<td>'+tools+'</td>'
      +'<td>'+(r.open_none==null?'–':r.open_none)+'</td></tr>';
  });
  h+='</table><div class="legend">Decision accuracy (% correct), mean over 3 seeds across all 98 items. Tool use lets each model call its own native tools (web search); open-weight models have none.</div>';
  document.getElementById('lbTable').innerHTML=h;
}
renderLeaderboard();
['axis','family','status','search'].forEach(id=>document.getElementById(id).addEventListener('input',render));
render(); counts();
</script>
</body>
</html>
